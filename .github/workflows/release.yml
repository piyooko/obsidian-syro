name: Release

on:
    push:
        tags:
            - "[0-9]*.[0-9]*.[0-9]*"

env:
    PLUGIN_NAME: syro
    COREPACK_ENABLE_STRICT: 0

permissions: write-all

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.10.0
                  run_install: false

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "pnpm"

            - name: Validate release tag
              run: |
                  if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                      echo "Release tag must be strict semver, got ${GITHUB_REF_NAME}" >&2
                      exit 1
                  fi

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: |
                  pnpm build
                  rm -rf ${{ env.PLUGIN_NAME }} ${{ env.PLUGIN_NAME }}-${GITHUB_REF_NAME}.zip
                  mkdir ${{ env.PLUGIN_NAME }}
                  cp build/main.js manifest.json build/styles.css ${{ env.PLUGIN_NAME }}
                  zip -r ${{ env.PLUGIN_NAME }}-${GITHUB_REF_NAME}.zip ${{ env.PLUGIN_NAME }}

            - name: Extract release notes
              id: extract-release-notes
              uses: ffurrer2/extract-release-notes@v1
              with:
                  changelog_file: docs/docs/changelog.md

            - name: Create GitHub Release and upload assets
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  body: ${{ steps.extract-release-notes.outputs.release_notes }}
                  files: |
                      ./${{ env.PLUGIN_NAME }}-${{ github.ref_name }}.zip
                      ./build/main.js
                      ./manifest.json
                      ./build/styles.css
                  fail_on_unmatched_files: true

            - name: Use Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: pip install -r docs/requirements.txt

            - name: Deploy the documentation
              run: mkdocs gh-deploy -f docs/mkdocs.yml --force --clean --verbose
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
